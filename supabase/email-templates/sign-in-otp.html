<!--
  Supabase → Authentication → Email Templates
  Use the template that sends a sign-in code (often "Magic Link" or "OTP" depending on your project).

  Subject (set in dashboard): Your FounderOS sign-in code

  Paste everything FROM <!DOCTYPE html> onward into the email body (omit this comment block if the editor strips it).
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Sign in to FounderOS</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      width: 100% !important;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      background-color: #f7f5f3;
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        'Segoe UI',
        Roboto,
        Helvetica,
        Arial,
        sans-serif;
    "
  >
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f7f5f3; padding: 40px 16px">
      <tr>
        <td align="center">
          <table
            role="presentation"
            cellspacing="0"
            cellpadding="0"
            border="0"
            width="100%"
            style="
              max-width: 480px;
              background-color: #ffffff;
              border-radius: 9px;
              border: 1px solid rgba(55, 50, 47, 0.12);
              box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.06);
            "
          >
            <tr>
              <td style="padding: 32px 28px 8px 28px; text-align: center">
                <p
                  style="
                    margin: 0 0 8px 0;
                    font-size: 22px;
                    line-height: 1.2;
                    font-weight: 400;
                    color: #37322f;
                    font-family: Georgia, 'Times New Roman', Times, serif;
                  "
                >
                  FounderOS
                </p>
                <p style="margin: 0; font-size: 13px; line-height: 1.45; font-weight: 500; color: rgba(55, 50, 47, 0.8)">
                  Your sign-in code
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 16px 28px 28px 28px">
                <p style="margin: 0 0 20px 0; font-size: 15px; line-height: 1.55; color: #605a57; text-align: center">
                  Enter this code on the sign-in screen. It expires soon and works only once.
                </p>
                <div
                  style="
                    text-align: center;
                    padding: 22px 16px;
                    margin: 0 0 24px 0;
                    background-color: #f7f5f3;
                    border-radius: 8px;
                    border: 1px solid rgba(2, 6, 23, 0.08);
                  "
                >
                  <p
                    style="
                      margin: 0 0 10px 0;
                      font-size: 11px;
                      font-weight: 600;
                      letter-spacing: 0.08em;
                      text-transform: uppercase;
                      color: rgba(49, 45, 43, 0.75);
                    "
                  >
                    One-time code
                  </p>
                  <p
                    style="
                      margin: 0;
                      font-size: 34px;
                      line-height: 1.15;
                      font-weight: 600;
                      letter-spacing: 0.28em;
                      color: #37322f;
                      font-family: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace;
                    "
                  >
                    {{ .Token }}
                  </p>
                </div>
                <p style="margin: 0 0 20px 0; font-size: 12px; line-height: 1.5; color: rgba(49, 45, 43, 0.65); text-align: center">
                  If you didn’t try to sign in, you can ignore this message.
                </p>
                <p style="margin: 0; font-size: 11px; line-height: 1.5; color: rgba(55, 50, 47, 0.5); text-align: center">
                  {{ .Email }} ·
                  <a href="{{ .SiteURL }}" style="color: #37322f; text-decoration: underline">FounderOS</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
